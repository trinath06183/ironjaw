{% extends 'base.html' %}

{% block content %}
<main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative;">
    <!-- Colorful animated background elements reflecting the theme -->
    <div class="hero-glow-1"></div>
    <div class="hero-glow-2"></div>
    
    <div class="container" style="position: relative; z-index: 10; width: 100%; max-width: 480px; padding-top: 100px; padding-bottom: 60px;">
      <div class="glass hover-lift" style="padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);">
        <div style="display:flex; justify-content: center; margin-bottom: 20px;">
          <div class="nav-logo-icon" style="width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" style="width: 24px; height: 24px;" aria-hidden="true"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/></svg>
          </div>
        </div>
        
        <h1 class="section-title" style="font-size: 2rem; margin-bottom: 10px; text-align: center;">Welcome <span style="color: var(--red);">Back</span></h1>
        <p class="section-sub" style="text-align: center; margin-bottom: 30px;">Login to your IronJaw account</p>
        
        <form id="loginForm" action="#" style="display: flex; flex-direction: column; gap: 24px;">
          <div>
            <label style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Select Fighting Style</label>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
              <label class="style-select-label" style="cursor: pointer; border: 1px solid var(--glass-bd); padding: 12px; border-radius: 8px; text-align: center; transition: all 0.3s; background: var(--bg2);">
                <input type="radio" name="fighting_style" value="kungfu" style="display: none;" checked>
                <div style="font-weight: 700; font-size: 0.9rem;">Kung Fu</div>
              </label>
              <label class="style-select-label" style="cursor: pointer; border: 1px solid var(--glass-bd); padding: 12px; border-radius: 8px; text-align: center; transition: all 0.3s; background: var(--bg2);">
                <input type="radio" name="fighting_style" value="karate" style="display: none;">
                <div style="font-weight: 700; font-size: 0.9rem;">Karate</div>
              </label>
              <label class="style-select-label" style="cursor: pointer; border: 1px solid var(--glass-bd); padding: 12px; border-radius: 8px; text-align: center; transition: all 0.3s; background: var(--bg2);">
                <input type="radio" name="fighting_style" value="taekwondo" style="display: none;">
                <div style="font-weight: 700; font-size: 0.9rem;">Taekwondo</div>
              </label>
            </div>
          </div>
          <style>
            .style-select-label:has(input:checked) {
              border-color: var(--red) !important;
              background: rgba(239, 68, 68, 0.1) !important;
              color: var(--red) !important;
            }
            .style-select-label:hover {
              border-color: var(--text-muted);
            }
          </style>

          <div>
            <label style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Email Address</label>
            <input type="email" placeholder="fighter@example.com" style="width: 100%; padding: 16px 18px; border-radius: 12px; border: 1px solid var(--glass-bd); background: var(--bg2); color: var(--text); font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.3s, box-shadow 0.3s;" onfocus="this.style.borderColor='var(--red)'; this.style.boxShadow='0 0 12px rgba(239,68,68,0.2)'" onblur="this.style.borderColor='var(--glass-bd)'; this.style.boxShadow='none'" required>
          </div>
          
          <div>
            <label style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">
              <span>Password</span>
              <a href="#" style="color: var(--red); text-transform: none; font-weight: 600; letter-spacing: normal;" onmouseover="this.style.color='var(--red-light)'" onmouseout="this.style.color='var(--red)'">Forgot?</a>
            </label>
            <div style="position: relative;">
              <input type="password" id="login-password" placeholder="••••••••" style="width: 100%; padding: 16px 48px 16px 18px; border-radius: 12px; border: 1px solid var(--glass-bd); background: var(--bg2); color: var(--text); font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.3s, box-shadow 0.3s;" onfocus="this.style.borderColor='var(--red)'; this.style.boxShadow='0 0 12px rgba(239,68,68,0.2)'" onblur="this.style.borderColor='var(--glass-bd)'; this.style.boxShadow='none'" required>
              <button type="button" onclick="const pwd=document.getElementById('login-password'); if(pwd.type==='password'){pwd.type='text';this.innerHTML='<svg viewBox=\'0 0 24 24\' width=\'18\' height=\'18\' stroke=\'currentColor\' stroke-width=\'2\' fill=\'none\'><path d=\'M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22\'/></svg>'}else{pwd.type='password';this.innerHTML='<svg viewBox=\'0 0 24 24\' width=\'18\' height=\'18\' stroke=\'currentColor\' stroke-width=\'2\' fill=\'none\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>'}" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; transition: color 0.2s;" onmouseover="this.style.color='var(--text-hard)'" onmouseout="this.style.color='var(--text-muted)'" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          
          <div style="display: flex; align-items: center; font-size: 0.9rem;">
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-dim); font-weight: 500;">
              <input type="checkbox" style="width: 18px; height: 18px; accent-color: var(--red); cursor: pointer;"> Remember me for 30 days
            </label>
          </div>
          
          <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 16px; font-size: 1rem; margin-top: 8px;">Login to Dashboard</button>
        </form>

        <script>
          document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const selectedStyle = document.querySelector('input[name="fighting_style"]:checked').value;
            localStorage.setItem('userStyle', selectedStyle);
            window.location.href = '/dashboard/';
          });
        </script>
        
        <div style="margin-top: 36px; text-align: center; font-size: 0.95rem; color: var(--text-dim); border-top: 1px solid var(--glass-bd); padding-top: 24px;">
          Don't have an account? 
          <a href="{% url 'register' %}" style="color: var(--text-hard); font-weight: 800; text-decoration: underline; text-decoration-color: var(--red); text-underline-offset: 4px; transition: color 0.3s;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text-hard)'">Start Free</a>
        </div>
      </div>
    </div>
  </main>
{% endblock %}
