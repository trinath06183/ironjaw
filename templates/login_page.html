<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

  <div class="min-h-screen flex items-center justify-center px-4">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-md">

      <!-- Heading -->
      <h2 class="text-3xl font-bold text-center mb-4">
        Welcome Back 👋
      </h2>
      <p class="text-gray-400 text-center mb-6">
        Login to continue your journey
      </p>

      <!-- Form -->
      <form onsubmit="return handleLogin()">

        <!-- Email -->
        <div class="mb-4">
          <label class="block mb-1 text-sm">Email</label>
          <input type="email" id="email" required
            placeholder="Enter your email"
            class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="block mb-1 text-sm">Password</label>
          <div class="relative">
            <input type="password" id="password" required
              placeholder="Enter your password"
              class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">
            
            <!-- Show/Hide Button -->
            <button type="button" onclick="togglePassword()"
              class="absolute right-3 top-2 text-sm text-gray-300">
              👁️
            </button>
          </div>
        </div>

        <!-- Remember + Forgot -->
        <div class="flex justify-between items-center mb-6 text-sm">
          <label class="flex items-center gap-2">
            <input type="checkbox" class="accent-red-500">
            Remember me
          </label>
          <a href="#" class="text-red-400 hover:underline">Forgot Password?</a>
        </div>

        <!-- Button -->
        <button type="submit"
          class="w-full bg-red-600 hover:bg-red-700 transition duration-300 py-2 rounded-lg font-semibold">
          Login
        </button>

      </form>

      <!-- Footer -->
      <p class="text-sm text-gray-400 text-center mt-6">
        Don’t have an account?
        <a href="#" class="text-red-500 hover:underline">Sign Up</a>
      </p>

    </div>
  </div>

<script>
  function togglePassword() {
    const passwordField = document.getElementById("password");
    passwordField.type = passwordField.type === "password" ? "text" : "password";
  }

  function handleLogin() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (email && password) {
      alert("Login successful!");
      return true;
    } else {
      alert("Please fill all fields!");
      return false;
    }
  }
</script>

</body>
</html>
