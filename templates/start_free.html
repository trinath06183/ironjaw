<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Free Trial</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* 🔁 ANIMATED BACKGROUND */
    body {
      background: linear-gradient(120deg, #050505, #1a0000, #000000);
      background-size: 200% 200%;
      animation: bgMove 12s ease infinite;
    }

    @keyframes bgMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* 💨 SMOKE EFFECT (no extra HTML) */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255, 0, 0, 0.05), transparent 60%),
        radial-gradient(circle at 70% 70%, rgba(255, 0, 0, 0.04), transparent 60%);
      animation: smokeMove 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes smokeMove {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(20px, -20px) scale(1.1);
      }

      100% {
        transform: translate(0, 0) scale(1);
      }
    }

    /* 🔥 EMBER CONTAINER */
    .ember-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ember {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, #fff8 0%, #ff2a2a 40%, transparent 70%);
      animation: ember-rise linear infinite;
      box-shadow: 0 0 8px #ff2a2a, 0 0 20px rgba(255, 0, 0, 0.5);
    }

    @keyframes ember-rise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.8;
      }

      100% {
        transform: translateY(-120vh) scale(0.2);
        opacity: 0;
      }
    }

    /* 🔴 GLOW BEHIND FORM */
    .max-w-md {
      position: relative;
    }

    .max-w-md::before {
      content: "";
      position: absolute;
      inset: -80px;
      background: radial-gradient(circle, rgba(255, 0, 0, 0.25), transparent 70%);
      filter: blur(60px);
      z-index: -1;
      animation: pulseGlow 4s ease-in-out infinite;
    }

    @keyframes pulseGlow {

      0%,
      100% {
        opacity: 0.4;
        transform: scale(1);
      }

      50% {
        opacity: 0.7;
        transform: scale(1.15);
      }
    }

    /* 🩸 TOP GLOW LINE */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(to right, transparent, #ff0000, transparent);
      box-shadow: 0 0 15px red;
      animation: dripLine 2s infinite;
      z-index: 1;
    }

    @keyframes dripLine {
      0% {
        opacity: 0.2;
        transform: scaleX(0.3);
      }

      50% {
        opacity: 1;
        transform: scaleX(1);
      }

      100% {
        opacity: 0.2;
        transform: scaleX(0.3);
      }
    }

    /* ⚡ INPUT GLOW */
    input:focus {
      box-shadow: 0 0 10px #ff2a2a, 0 0 20px rgba(255, 0, 0, 0.3);
    }

    /* 🔥 BUTTON EFFECT */
    button[type="submit"] {
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
      transition: all 0.3s ease;
    }

    button[type="submit"]:hover {
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.7);
      transform: scale(1.03);
    }
  </style>

</head>

<body class="text-white relative">

  <!-- 🔥 EMBERS BACKGROUND -->
  <div id="embers" class="ember-container"></div>

  <div class="min-h-screen flex items-center justify-center px-4 relative z-10">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-full max-w-md">

      <h2 class="text-3xl font-bold text-center mb-4">
        Start Your Free Trial
      </h2>
      <p class="text-gray-400 text-center mb-6">
        Join now and explore all fighters for free 🚀
      </p>


      <form method="POST" action="{% url 'register' %}" onsubmit="return validateForm()">


        {% csrf_token %}

        <div class="mb-4">

          <label class="block mb-1 text-sm">Username</label>
          <input type="text" name="username" placeholder="Create a Username" required
            class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <div class="mb-4">

          <label class="block mb-1 text-sm">Email</label>
          <input type="email" name="email" placeholder="Enter your Email" required
            class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <div class="mb-4 flex gap-4">

          <div class="w-1/2">
            <label class="block mb-1 text-sm">Password</label>
            <input type="password" name="password" required placeholder="Password"
              class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">
          </div>
          <div class="w-1/2">
            <label class="block mb-1 text-sm">Confirm Password</label>
            <input type="password" name="confirm_password" required placeholder="Confirm"
              class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">
          </div>
        </div>

        <div class="mb-4 flex gap-4">
          <div class="w-1/3">

            <label class="block mb-1 text-sm">Age</label>
            <input type="number" name="age" min="10" max="100" required placeholder="Age"
              class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">
          </div>
          <div class="w-1/3">

            <label class="block mb-1 text-sm">Height (cm)</label>
            <input type="number" name="height" required placeholder="Height"
              class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">
          </div>
          <div class="w-1/3">

            <label class="block mb-1 text-sm">Weight (kg)</label>
            <input type="number" name="weight" required placeholder="Weight"
              class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">
          </div>
        </div>


        <div class="mb-4">
          <label class="block mb-1 text-sm">Fighting Style</label>
          <select name="selected_fighting_style" required
            class="w-full px-4 py-2 rounded-lg bg-gray-700 text-white focus:outline-none focus:ring-2 focus:ring-red-500">
            <option value="">Select a style...</option>
            {% for value, name in profile_form.selected_fighting_style.field.choices %}
              {% if value %}
              <option value="{{ value }}">{{ name }}</option>
              {% endif %}
            {% endfor %}
          </select>
        </div>

        <div class="mb-4">

          <label class="block mb-2 text-sm">Gender</label>
          <div class="flex items-center gap-4">
            <label><input type="radio" name="gender" value="Male" required class="accent-red-500"> Male</label>
            <label><input type="radio" name="gender" value="Female" class="accent-red-500"> Female</label>
            <label><input type="radio" name="gender" value="Other" class="accent-red-500"> Other</label>
          </div>
        </div>

        <div class="mb-4">
          <label class="block mb-2 text-sm">Captcha</label>
          <div id="captchaBox" class="bg-gray-700 text-center py-2 rounded-lg mb-2 tracking-widest text-lg font-bold">
          </div>

          <input type="text" id="captchaInput" required placeholder="Enter captcha"
            class="w-full px-4 py-2 rounded-lg bg-gray-700 focus:outline-none focus:ring-2 focus:ring-red-500">

          <button type="button" onclick="generateCaptcha()" class="mt-2 text-sm text-red-400 hover:underline">
            Refresh Captcha
          </button>
        </div>

        <div class="mb-4 flex items-center gap-2 text-sm">
          <input type="checkbox" id="terms" required class="accent-red-500">
          <label for="terms">I agree to Terms & Conditions</label>
        </div>

        <button type="submit"
          class="w-full bg-red-600 hover:bg-red-700 transition duration-300 py-2 rounded-lg font-semibold">
          JOIN IRONJAW
        </button>

      </form>


    </div>
  </div>

  <script>
    const emberContainer = document.getElementById('embers');

    function spawnEmber() {
      const e = document.createElement('div');
      e.className = 'ember';

      const size = Math.random() * 6 + 2;

      e.style.cssText = `
      width:${size}px;
      height:${size}px;
      left:${Math.random() * 100}%;
      bottom:${Math.random() * 20}%;
      animation-duration:${Math.random() * 6 + 4}s;
      opacity:${Math.random() * .7 + .3};
    `;

      emberContainer.appendChild(e);
      setTimeout(() => e.remove(), 10000);
    }

    setInterval(spawnEmber, 400);

    let captchaText = "";

    function generateCaptcha() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
      captchaText = "";
      for (let i = 0; i < 6; i++) {
        captchaText += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById("captchaBox").innerText = captchaText;
    }

    function validateForm() {
      const userInput = document.getElementById("captchaInput").value;

      if (userInput !== captchaText) {
        alert("Captcha incorrect! Try again.");
        generateCaptcha();
        return false;
      }

      alert("Form submitted successfully!");
      return true;
    }

    window.onload = generateCaptcha;
  </script>

</body>

</html>
