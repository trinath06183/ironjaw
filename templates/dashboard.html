{% extends 'base.html' %}

{% block content %}
<style>
  .dashboard-main {
    min-height: 100vh;
    padding-top: 90px;
    padding-bottom: 60px;
  }
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
  }
  @media(min-width: 1024px) {
    .dashboard-grid {
      grid-template-columns: 2fr 1fr;
    }
  }
  
  /* Style Highlights */
  body[data-style="kungfu"] {
    --style-accent: #f59e0b;
    --style-bg-glow: rgba(245, 158, 11, 0.2);
  }
  body[data-style="karate"] {
    --style-accent: #ef4444;
    --style-bg-glow: rgba(239, 68, 68, 0.2);
  }
  body[data-style="taekwondo"] {
    --style-accent: #3b82f6;
    --style-bg-glow: rgba(59, 130, 246, 0.2);
  }
  body[data-style="generic"] {
    --style-accent: #8b5cf6;
    --style-bg-glow: rgba(139, 92, 246, 0.2);
  }

  .style-accent-text { color: var(--style-accent, var(--red)); }
  .style-accent-border { border-color: var(--style-accent, var(--red)); }
  .style-accent-bg { background: var(--style-accent, var(--red)); }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .gallery-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid var(--glass-bd);
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .gallery-img:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    border-color: var(--style-accent, var(--red));
  }

  /* Chat Module */
  .chat-box {
    display: flex;
    flex-direction: column;
    height: 400px;
    border-radius: 16px;
    background: var(--bg2);
    border: 1px solid var(--glass-bd);
    overflow: hidden;
  }
  .chat-header {
    padding: 16px;
    background: var(--glass-bg);
    border-bottom: 1px solid var(--glass-bd);
    font-weight: 700;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .chat-messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .chat-msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.4;
  }
  .chat-msg.user {
    align-self: flex-end;
    background: var(--style-accent, var(--red));
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .chat-msg.ai {
    align-self: flex-start;
    background: var(--glass-bg);
    border: 1px solid var(--glass-bd);
    border-bottom-left-radius: 4px;
  }
  .chat-input {
    display: flex;
    padding: 12px;
    background: var(--glass-bg);
    border-top: 1px solid var(--glass-bd);
  }
  .chat-input input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 8px 12px;
    outline: none;
  }
  .chat-input button {
    background: var(--style-accent, var(--red));
    border: none;
    color: white;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
  }

  /* Directories */
  .directory-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .dir-item {
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--glass-bd);
    background: var(--bg2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dir-item-title {
    font-weight: 700;
    font-size: 1.05rem;
  }
  .dir-item-sub {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .dir-item-rate {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #fbbf24;
    font-weight: 700;
    font-size: 0.9rem;
  }
  
  .search-bar {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--glass-bd);
    background: var(--bg2);
    color: var(--text);
    margin-bottom: 20px;
    outline: none;
  }
  .search-bar:focus {
    border-color: var(--style-accent, var(--red));
  }
</style>

<main class="dashboard-main container">
  <!-- Dynamic Dashboard Header -->
  <div style="margin-bottom: 40px; text-align: center; position: relative;">
    <div class="hero-glow-1" style="background: var(--style-bg-glow); opacity: 0.7;"></div>
    <div class="tag-red style-accent-border" id="styleTag" style="color: var(--style-accent, var(--red)); background: var(--style-bg-glow);">
      <span class="dot style-accent-bg"></span>
      <span id="styleLabel">Loading...</span>
    </div>
    <h1 class="section-title" style="margin-top: 16px;" id="dashboardTitle">
      Your <span class="style-accent-text" id="dashboardHighlight">Hub</span>
    </h1>
    <p class="section-sub" id="dashboardSub">Welcome to your personalized training dashboard.</p>
  </div>

  <div class="dashboard-grid">
    <!-- Left Column: Content Galleries & Directory -->
    <div style="display: flex; flex-direction: column; gap: 40px;">
      
      <!-- Gallery Section -->
      <section class="glass" style="padding: 24px; border-radius: 20px;">
        <h2 style="font-size: 1.5rem; margin-bottom: 20px; font-weight: 800;">Techniques & Demos</h2>
        <div class="gallery-grid" id="galleryGrid">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Directory Section -->
      <section class="glass" style="padding: 24px; border-radius: 20px;">
        <h2 style="font-size: 1.5rem; margin-bottom: 20px; font-weight: 800;">Nearby Training Centers</h2>
        <input type="text" class="search-bar" id="dirSearch" placeholder="Search by location or name...">
        <div class="directory-list" id="directoryList">
          <!-- Populated by JS -->
        </div>
      </section>

    </div>

    <!-- Right Column: AI Chat Module -->
    <div>
      <div class="chat-box glass" style="position: sticky; top: 100px;">
        <div class="chat-header">
          <span>AI Coach Discussion</span>
          <span style="font-size: 0.8rem; background: var(--style-bg-glow); color: var(--style-accent, var(--red)); padding: 4px 8px; border-radius: 8px;">Live</span>
        </div>
        <div class="chat-messages" id="chatWindow">
          <div class="chat-msg ai" id="chatWelcome">Hello! Ask me anything about your training.</div>
        </div>
        <div class="chat-input">
          <input type="text" id="chatMsgInput" placeholder="Ask about techniques or gear...">
          <button id="chatSendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  // 1. Data Definitions for Mocking
  const styleData = {
    kungfu: {
      name: "Kung Fu",
      titleHighlight: "Shaolin Hub",
      sub: "Master ancient forms, agility, and explosive strikes.",
      themeName: "kungfu",
      images: [
        "https://images.unsplash.com/photo-1549476464-37392f717541?w=400&q=80",
        "https://images.unsplash.com/photo-1596357395217-80de13130e92?w=400&q=80",
        "https://images.unsplash.com/photo-1555597673-b21d5c935865?w=400&q=80"
      ],
      aiWelcome: "Welcome to Kung Fu training! Ask me about stances like Ma Bu or striking techniques."
    },
    karate: {
      name: "Karate",
      titleHighlight: "Dojo",
      sub: "Focus on discipline, kata precision, and strong foundations.",
      themeName: "karate",
      images: [
        "https://images.unsplash.com/photo-1686729917714-ced212e45227?w=400&q=80",
        "https://images.unsplash.com/photo-1525169429711-f1113ed7392e?w=400&q=80",
        "https://images.unsplash.com/photo-1564415315949-2708a3dcb1c6?w=400&q=80"
      ],
      aiWelcome: "Osu! Welcome to your Karate dashboard. What Kata are we practicing today?"
    },
    taekwondo: {
      name: "Taekwondo",
      titleHighlight: "Dojang",
      sub: "Develop explosive kicks, speed, and flexibility.",
      themeName: "taekwondo",
      images: [
        "https://images.unsplash.com/photo-1555597673-b21d5c935865?w=400&q=80",
        "https://images.unsplash.com/photo-1509653087866-91f6c2ab5a42?w=400&q=80",
        "https://images.unsplash.com/photo-1476480862126-209bfaa8edc8?w=400&q=80"
      ],
      aiWelcome: "Welcome to Taekwondo! Need tips on your spinning hook kick?"
    },
    generic: {
      name: "Martial Arts",
      titleHighlight: "Training Center",
      sub: "General martial arts training, conditioning, and techniques.",
      themeName: "generic",
      images: [
        "https://images.unsplash.com/photo-1583473848882-f9a5bc7fd2ee?w=400&q=80",
        "https://images.unsplash.com/photo-1555597673-b21d5c935865?w=400&q=80",
        "https://images.unsplash.com/photo-1599058917212-d750089bc07e?w=400&q=80"
      ],
      aiWelcome: "Welcome! Ask me anything about martial arts training and conditioning."
    }
  };

  const directoryData = [
    { name: "Dragon Spirit Academy", loc: "Downtown", rating: 4.8, style: "kungfu" },
    { name: "Shaolin Temple Branch", loc: "Northside", rating: 4.9, style: "kungfu" },
    { name: "Red Dragon Dojo", loc: "West End", rating: 4.7, style: "karate" },
    { name: "Cobra Strike Karate", loc: "Downtown", rating: 4.5, style: "karate" },
    { name: "Elite Taekwondo Center", loc: "Southside", rating: 4.8, style: "taekwondo" },
    { name: "Flying Kick Academy", loc: "East Bay", rating: 4.6, style: "taekwondo" },
    { name: "Iron Fury MMA", loc: "Uptown", rating: 4.9, style: "generic" },
    { name: "Urban Fighters Gym", loc: "Downtown", rating: 4.4, style: "generic" }
  ];

  // 2. Initialization
  document.addEventListener('DOMContentLoaded', () => {
    // Read selected style, fallback to generic
    let userStyleKey = localStorage.getItem('userStyle') || 'generic';
    if (!styleData[userStyleKey]) userStyleKey = 'generic';

    const currentStyle = styleData[userStyleKey];

    // Apply Theme context
    document.body.setAttribute('data-style', currentStyle.themeName);

    // Update Text
    document.getElementById('styleLabel').innerText = currentStyle.name + " Plan Active";
    document.getElementById('dashboardHighlight').innerText = currentStyle.titleHighlight;
    document.getElementById('dashboardSub').innerText = currentStyle.sub;
    document.getElementById('chatWelcome').innerText = currentStyle.aiWelcome;

    // Load Gallery
    const galleryGrid = document.getElementById('galleryGrid');
    currentStyle.images.forEach(imgUrl => {
      const img = document.createElement('img');
      img.src = imgUrl;
      img.className = 'gallery-img';
      galleryGrid.appendChild(img);
    });

    // Load Directory
    renderDirectory(userStyleKey, "");

    // Search Binding
    document.getElementById('dirSearch').addEventListener('input', (e) => {
      renderDirectory(userStyleKey, e.target.value.toLowerCase());
    });

    // Chat Binding
    const chatInput = document.getElementById('chatMsgInput');
    const sendBtn = document.getElementById('chatSendBtn');
    
    const sendMsg = () => {
      const text = chatInput.value.trim();
      if(text) {
        appendMsg('user', text);
        chatInput.value = '';
        setTimeout(() => {
          appendMsg('ai', "That is a great question! Based on " + currentStyle.name + " principles, you should maintain solid breathing and center of gravity.");
        }, 1000);
      }
    };
    sendBtn.addEventListener('click', sendMsg);
    chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
  });

  function renderDirectory(styleKey, query) {
    const list = document.getElementById('directoryList');
    list.innerHTML = '';
    
    // Filter to currently selected style and search query
    let filtered = directoryData.filter(d => 
      (d.style === styleKey || styleKey === 'generic') &&
      (d.name.toLowerCase().includes(query) || d.loc.toLowerCase().includes(query))
    );

    if (filtered.length === 0) {
      list.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 20px;">No centers found matching your criteria.</div>';
      return;
    }

    filtered.forEach(d => {
      const item = document.createElement('div');
      item.className = 'dir-item hover-lift';
      item.innerHTML = `
        <div>
          <div class="dir-item-title">${d.name}</div>
          <div class="dir-item-sub">📍 ${d.loc} • Specialty: ${d.style.toUpperCase()}</div>
        </div>
        <div class="dir-item-rate">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
          ${d.rating}
        </div>
      `;
      list.appendChild(item);
    });
  }

  function appendMsg(type, text) {
    const win = document.getElementById('chatWindow');
    const msg = document.createElement('div');
    msg.className = 'chat-msg ' + type;
    msg.innerText = text;
    win.appendChild(msg);
    win.scrollTop = win.scrollHeight;
  }
</script>
{% endblock %}
